<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="center">

<div class="form-container">

    <p id="serviceName"></p>

    <p id="message"></p>
</div>

<script src="booking.js"></script>
</body>
</html>
