<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixMate - Dashboard</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<div class="logo">
    <i class="fas fa-tools"></i> FixMate
</div>

<div class="dashboard-container">
    <h2 id="welcomeText">
        <i class="fas fa-tachometer-alt"></i> Welcome
    </h2>

    <p>You have successfully logged in.</p>

    <div class="btn-group">

        <!-- SERVICES -->
        <button onclick="window.location.href='services.html'" class="btn">
            <i class="fas fa-tools"></i> View Services
        </button>

        <!-- HISTORY -->
        <button onclick="window.location.href='history.html'" class="btn">
            My Bookings
        </button>

        <!-- ADMIN (HIDDEN BY DEFAULT) -->
        <button id="adminBtn" class="btn" style="display:none;">
            <i class="fas fa-user-shield"></i> Admin Panel
        </button>

        <!-- LOGOUT -->
        <button onclick="window.location.href='login.html'" class="btn">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>

    </div>
</div>

<script src="dashboard.js"></script>

</body>
</html>
