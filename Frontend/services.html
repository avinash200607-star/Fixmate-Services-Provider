<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="services-container">

    <h2>Our Services</h2>

    <div class="service-card">
        <h3>Plumber</h3>
        <p>Price: ₹500</p>
        <button class="btn" onclick="bookService('Plumber')">Book Now</button>
    </div>

    <div class="service-card">
        <h3>Electrician</h3>
        <p>Price: ₹400</p>
        <button class="btn" onclick="bookService('Electrician')">Book Now</button>
    </div>

    <div class="service-card">
        <h3>AC Repair</h3>
        <p>Price: ₹800</p>
        <button class="btn" onclick="bookService('AC Repair')">Book Now</button>
    </div>

</div>

<script src="services.js"></script>
</body>
</html>
